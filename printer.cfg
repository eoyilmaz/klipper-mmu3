[respond]
[include chopper_tune.cfg]
[include mainsail.cfg]
[include mmu3-12x.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_350042001851313238353730-if00

[mcu ebb]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_360057001750304158373620-if00

# [mcu rpi]
# serial: /tmp/klipper_host_mcu

[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_50445059383D871C-if00
restart_method: command

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 20000
max_z_velocity: 20
max_z_accel: 200

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

# This file contains common pin mappings for the BigTreeTech SKR 3.
# This board can ship with one of two chips, STM32H743 or STM32H723.
# To use this config, during "make menuconfig" enable "low-level
# options", "STM32H743" or "STM32H723", "128KiB bootloader",
# and "25MHz clock".

# See docs/Config_Reference.md for a description of parameters.

[stepper_x]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 64 # 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x: virtual_endstop # ^PC1
position_endstop: 0
position_max: 235
homing_speed: 30
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PD5
#run_current: 1.100
diag_pin: PC1
stealthchop_threshold: 0 # 999999
driver_sgthrs: 44
interpolate: True

[stepper_y]
step_pin: PA15
dir_pin: !PA8
enable_pin: !PD1
microsteps: 64 # 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y: virtual_endstop # ^PC3
position_endstop: 0
position_min: 0
position_max: 248.5
homing_speed: 50  # 30
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PD0
diag_pin: PC3
# run_current: 1.100
stealthchop_threshold: 0 # 999999
driver_sgthrs: 44
interpolate: True

[stepper_z]
step_pin: PE2
dir_pin: PE3
enable_pin: !PE0
microsteps: 16
rotation_distance: 4
# gear_ratio: 40:20
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 242
homing_speed: 15

[tmc2209 stepper_z]
uart_pin: PE1
#run_current: 0.400
stealthchop_threshold: 999999

[stepper_z1]
step_pin: PD11
dir_pin: PD10
enable_pin: !PD13
microsteps: 16
rotation_distance: 4
# gear_ratio: 40:20
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop

[tmc2209 stepper_z1]
uart_pin: PD12
#run_current: 0.400
stealthchop_threshold: 999999

[stepper_z2]
step_pin: PD15
dir_pin: PD14
enable_pin: !PC7
microsteps: 16
rotation_distance: 4
# gear_ratio: 40:20
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop

[tmc2209 stepper_z2]
uart_pin: PC6
#run_current: 0.400
stealthchop_threshold: 999999

[extruder]
step_pin: ebb:PB14
dir_pin: ebb:PA8
enable_pin: !ebb:PB6
microsteps: 16
gear_ratio: 42:12
rotation_distance: 26.50 # 23.06725347 # 23.015
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: ebb:PB4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: ebb:PA3
pullup_resistor: 2200
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
# min_extrude_temp: 10
min_temp: 0
max_temp: 300
pressure_advance: 0.044 # 0.048
max_extrude_only_velocity: 100
max_extrude_cross_section: 10.0
max_extrude_only_accel: 5000
max_extrude_only_distance: 1000.0

[tmc2209 extruder]
uart_pin: ebb:PB3
run_current: 0.650

[heater_bed]
heater_pin: PD7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA1
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 110

[fan]
pin: ebb:PD3

[heater_fan fan1]
pin: ebb:PA5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
max_errors: 3
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: 0
y_offset: 22.245
tap_adjust_z: 0.05

# [safe_z_home]
# # home_xy_position: 147.5, 142.5
# # home_xy_position: 32, 230
# home_xy_position: 117.5, 95.2
# z_hop: 2
# z_hop_speed: 15.0

[force_move]
enable_force_move: true

[homing_override]
axes: xyz
gcode:
  # 1. Safety Z-hop
  # Lifts the head 10mm. If Z isn't homed, it forces a "fake" position first.
  SET_KINEMATIC_POSITION Z=0
  G1 Z2 F600

  # Determine if we are doing a full G28 or just specific axes
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  # 2. Home Y First
  {% if home_all or 'Y' in params %}
    G28 Y
  {% endif %}

  # 3. Home X Second
  {% if home_all or 'X' in params %}
    G28 X
  {% endif %}

  # 4. Home Z Last
  {% if home_all or 'Z' in params %}
    G1 X117.5 Y95.2 F6000
    G28 Z
    G1 Z5 # Lift Z after homing to avoid dragging the nozzle
  {% endif %}

[bed_mesh]
speed: 200
horizontal_move_z: 2
mesh_min: 10, 24.30
mesh_max: 220, 225 # 215, 225  # 205, 225
probe_count: 21, 21
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0
adaptive_margin: 5
scan_overshoot: 10

[screws_tilt_adjust]
screw1_name: front left screw
screw1: 29,16

screw2_name: front right screw
screw2: 200,16

screw3_name: rear right screw
screw3: 200,178.70

screw4_name: rear left screw
screw4: 29,178.70

horizontal_move_z: 10
speed: 200
screw_thread: CW-M4

[z_tilt]
z_positions: -28.00, 7
             256.50, 7
             117.5, 285

points: 29,16  # same with screw1
        200,16  # same with screw2
        # 195,158 # same with screw3
        # 24,158  # same with screw4
        117.5,178.70  # middle of screw3 and screw4

speed: 200
horizontal_move_z: 5
retries: 10
retry_tolerance: 0.02

[input_shaper]
# 2026-02-22 - E3NG v1.2 & Sprite Extruder Upgrade
shaper_freq_x: 57.8
shaper_type_x: mzv
shaper_freq_y: 52.4
shaper_type_y: 2hump_ei
# 2026-02-07 - E3NG v1.2 Upgrade
# shaper_freq_x: 79.6
# shaper_type_x: 3hump_ei
# shaper_freq_y: 39.2
# shaper_type_y: mzv
# 2025-10-07 - After Belted Z conversion and new extruder with cutter
#shaper_freq_x: 31.4
#shaper_type_x: mzv
#shaper_freq_y: 38.4
#shaper_type_y: mzv
# 2025-10-07 - After Belted Z conversion and new extruder with cutter
# shaper_freq_x: 46.8
# shaper_type_x: ei
# shaper_freq_y: 47.2
# shaper_type_y: ei
# 2025-10-07 - After Belted Z conversion and new extruder with cutter
# shaper_freq_x: 95.0
# shaper_type_x: 3hump_ei
# shaper_freq_y: 38.4
# shaper_type_y: mzv
# ZV shaper
# shaper_freq_x: 56.6
# shaper_freq_y: 45.0
# shaper_type: zv
# For MZV shaper
# shaper_freq_x: 52.0
# shaper_freq_y: 34.8
# shaper_type: mzv

[filament_switch_sensor my_filament_sensor]
switch_pin: !ebb:PA15
pause_on_runout: False
runout_gcode:
  G90  # set to absolute positioning
  SET_IDLE_TIMEOUT TIMEOUT=86400
  M300
  PAUSE
  M117 Filament switch runout
  M118 Filament switch runout

[filament_motion_sensor encoder_sensor]
switch_pin: ^PA0
# event_delay: 3.0  # ignore new events for this amount of time after and event is triggered, default i 3.0
detection_length: 6.00 # accuracy of motion sensor 2.88mm
extruder: extruder
pause_on_runout: False
runout_gcode:
  G90  # set to absolute positioning
  SET_IDLE_TIMEOUT TIMEOUT=86400
  M300
  PAUSE
  M117 Filament encoder runout
  M118 Filament encoder runout
insert_gcode:
  M117 Filament encoder inserted
  M118 Filament encoder inserted

[temperature_sensor ebb]
sensor_type: Generic 3950
sensor_pin: ebb:PA0
pullup_resistor: 2200

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_fan MCU_fan]
pin: PB6  # mmboard:PC7
kick_start_time: 0.5
max_power: 1.0
min_temp: 0
max_temp: 90
hardware_pwm: true
target_temp: 40
sensor_type: temperature_mcu
max_speed: 1.0
min_speed: 0.0
control: pid
pid_Kp: 2.0     ;40
pid_Ki: 5.0     ;0.2
pid_Kd: 0.5     ;0.1
pid_deriv_time: 2.0
#control: watermark # use this control if pid control does not work for your fan

# Defined as an LED for ease of control
[neopixel toolhead_led]
pin: PE6
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 1.0

[output_pin main_led]
pin: mmboard:PC6
pwm: True
value: 1
cycle_time: 0.010

[skew_correction]

[exclude_object]

[gcode_arcs]

# [adxl345]
# cs_pin: rpi:None

[lis2dw]
cs_pin: ebb:PB1
spi_bus:spi2_PB2_PB11_PB10
axes_map: x,y,z

[resonance_tester]
accel_chip: lis2dw
probe_points: 117.5, 112.5, 20

########################################
# EXP1 / EXP2 (display) pins
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PC5, EXP1_3=PB1, EXP1_5=PE9,  EXP1_7=PE11, EXP1_9=<GND>,
    EXP1_2=PB0, EXP1_4=PE8, EXP1_6=PE10, EXP1_8=PE12, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=PA6, EXP2_3=PE7, EXP2_5=PB2, EXP2_7=PC4,   EXP2_9=<GND>,
    EXP2_2=PA5, EXP2_4=PA4, EXP2_6=PA7, EXP2_8=<RST>, EXP2_10=<NC>

# See the sample-lcd.cfg file for definitions of common LCD displays.

[display]
lcd_type: st7920
cs_pin: EXP1_7
sclk_pin: EXP1_6
sid_pin: EXP1_8
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1


[include chopper_tune.cfg]


[axis_twist_compensation]
calibrate_start_x: 20
calibrate_end_x: 200
calibrate_y: 117.5
calibrate_start_y: 45
calibrate_end_y: 225
calibrate_x: 117.5


# disable requiring homing after steppers are disabled
[gcode_macro M84]
rename_existing: M984
gcode:
  SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0
  SET_STEPPER_ENABLE STEPPER=stepper_x ENABLE=0
  SET_STEPPER_ENABLE STEPPER=stepper_y ENABLE=0
  SET_STEPPER_ENABLE STEPPER=stepper_z ENABLE=0
  SET_STEPPER_ENABLE STEPPER=stepper_z1 ENABLE=0

[gcode_macro M18]
rename_existing: M918
gcode:
  M84

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True ; use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 187.0 ; custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 230.0 ; custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 2.0   ; custom dz value; the value in mm to lift the nozzle when move to park position
gcode:

# DISABLED DEFAULT MENU ITEMS
# we disable some of the default menu items, we now have others or improved ones
[menu __main __octoprint]
type: disabled

[menu __main __temp __preheat_pla]
type: list
name: Preheat PLA

[menu __main __temp __preheat_pla __all]
type: command
enable: {('extruder' in printer) and ('heater_bed' in printer)}
name: Preheat all
gcode:
    M140 S65
    M104 S215

[menu __main __temp __preheat_pla __hotend]
type: command
enable: {'extruder' in printer}
name: Preheat hotend
gcode: M104 S215

[menu __main __temp __preheat_pla __hotbed]
type: command
enable: {'heater_bed' in printer}
name: Preheat hotbed
gcode: M140 S65

[menu __main __temp __preheat_petg]
type: list
name: Preheat PETG

[menu __main __temp __preheat_petg __all]
type: command
enable: {('extruder' in printer) and ('heater_bed' in printer)}
name: Preheat all
gcode:
    M140 S70
    M104 S235

[menu __main __temp __preheat_petg __hotend]
type: command
enable: {'extruder' in printer}
name: Preheat hotend
gcode: M104 S235

[menu __main __temp __preheat_petg __hotbed]
type: command
enable: {'heater_bed' in printer}
name: Preheat hotbed
gcode: M140 S70


[menu __main __temp __preheat_abs]
type: list
name: Preheat ABS

[menu __main __temp __preheat_abs __all]
type: command
enable: {('extruder' in printer) and ('heater_bed' in printer)}
name: Preheat all
gcode:
    M140 S95
    M104 S240

[menu __main __temp __preheat_abs __hotend]
type: command
enable: {'extruder' in printer}
name: Preheat hotend
gcode: M104 S240

[menu __main __temp __preheat_abs __hotbed]
type: command
enable: {'heater_bed' in printer}
name: Preheat hotbed
gcode: M140 S70


